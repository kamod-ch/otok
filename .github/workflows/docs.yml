name: Docs

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter docs build

      - name: Check Pages configuration
        id: pages
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/pages --silent

      - name: Upload artifact
        if: github.event_name != 'pull_request' && steps.pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check Pages configuration
        id: pages
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/${{ github.repository }}/pages --silent

      - name: Deploy to GitHub Pages
        if: steps.pages.outcome == 'success'
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Skip deployment notice
        if: steps.pages.outcome != 'success'
        run: echo "GitHub Pages is not enabled for this repository. Enable Pages with Source set to GitHub Actions in repository settings to deploy docs."

name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - "packages/**"
      - ".github/workflows/deploy.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter docs build

      - name: Verify docs artifact
        run: |
          if [ ! -f apps/docs/dist/index.html ]; then
            echo "apps/docs/dist/index.html was not generated" >&2
            if [ -d apps/docs/dist ]; then
              find apps/docs/dist -maxdepth 3 -type f | sort >&2
            else
              echo "apps/docs/dist directory was not generated" >&2
            fi
            exit 1
          fi

      - name: Add .nojekyll
        run: touch apps/docs/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/docs/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
